name: Build XianYu Multi Push Tweak

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  
jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Theos
      uses: Randomblock1/theos-action@v1
      with:
        theos-dir: '${{ github.workspace }}/theos'
        theos-src: 'https://github.com/theos/theos'
        theos-sdks: 'https://github.com/theos/sdks'
        
    - name: Build Tweak
      run: |
        cd XianYuMultiPushTweak
        echo "[*] Building XianYuMultiPushTweak..."
        export THEOS=${{ github.workspace }}/theos
        export PATH="$(brew --prefix make)/libexec/gnubin:$PATH"
        make clean || true
        make package FINALPACKAGE=1
        ls -la packages/
      continue-on-error: false
      
    - name: Debug on failure
      if: failure()
      run: |
        echo "=== Debug Info ==="
        ls -la XianYuMultiPushTweak/
        ls -la XianYuMultiPushTweak/packages/ 2>/dev/null || echo "No packages dir"
        cat XianYuMultiPushTweak/Makefile
        
    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: XianYuMultiPushTweak-deb
        path: XianYuMultiPushTweak/packages/*.deb
        
    - name: Create Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          Automated build of XianYu Multi Push Tweak
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
        files: XianYuMultiPushTweak/packages/*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
