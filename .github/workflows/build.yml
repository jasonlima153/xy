name: Build XianYu Multi Push Tweak

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Theos
      uses: Randomblock1/theos-action@v1
      with:
        theos-dir: 'theos'
        theos-src: 'https://github.com/theos/theos'
        theos-sdks: 'https://github.com/theos/sdks'
        orion: 'false'
        
    - name: Build Tweak
      run: |
        cd XianYuMultiPushTweak
        echo "[*] Building XianYuMultiPushTweak..."
        export THEOS=../theos
        make clean
        make package
        ls -la packages/
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: XianYuMultiPushTweak-deb
        path: XianYuMultiPushTweak/packages/*.deb
        
    - name: Create Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          Automated build of XianYu Multi Push Tweak
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
        files: XianYuMultiPushTweak/packages/*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
